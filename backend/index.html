<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiosk Admin</title>
  
  <link rel="stylesheet" href="admin.css">
  
</head>
<body>
<div id="loginBox">
  <h1>Admin Login</h1>
  <input
      id="loginUser"
      placeholder="Username"
      style="
        width:100%;
        padding:10px;
        box-sizing:border-box;
        margin-bottom:12px;
      "
  >
  <div style="margin-top:12px;">
    <input
        id="loginPass"
        type="password"
        placeholder="Password"
        style="
          width:100%;
          padding:10px;
          box-sizing:border-box;
        "
    >
    <label style="
        display:flex;
        align-items:center;
        gap:8px;
        margin-top:10px;
        font-size:14px;
        color:#555;
        cursor:pointer;
    ">
      <input
          type="checkbox"
          style="
            width:16px;
            height:16px;
            cursor:pointer;
          "
          onchange="
            document.getElementById('loginPass').type =
              this.checked ? 'text' : 'password';
          "
      >
      <span>Show Password</span>
    </label>
  </div>
  <button
      onclick="login()"
      style="
        width:100%;
        margin-top:18px;
        padding:10px;
      "
  >
    Login
  </button>
  <p id="loginMsg"></p>
</div>

<div id="adminApp" style="display:none;">
	
  <div class="wrap">
  
  <div class="topbar">
    <h1>Kiosk Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>
  
  <div class="tabs">
  <button class="tab-button active"
          onclick="showTab('questionnaires', this)">
    Questionnaires
  </button>

  <button class="tab-button"
          onclick="showTab('kiosks', this)">
    Kiosks
  </button>

  <button class="tab-button"
          onclick="showTab('responses', this)">
    Responses
  </button>
  </div>
  
  <div id="questionnaires" class="tab-content">
	
    <div class="card">
      <h2>Create Questionnaire</h2>

      <label>Questionnaire Code</label>
      <input id="q_code" placeholder="e.g. QNR-3">

      <label>Questionnaire Name</label>
      <input id="q_name" placeholder="e.g. Service Quality Survey">

      <label>Active</label>
      <select id="q_active">
        <option value="true" selected>true</option>
        <option value="false">false</option>
      </select>

      <h3>Add Question</h3>

      <label>Question Code</label>
      <input id="question_code" placeholder="e.g. Q1">

      <label>Order No</label>
      <input id="question_order" type="number" value="1">

      <label>Question Type</label>
      <select id="question_type" onchange="toggleOptionsArea()">
        <option value="rating">rating</option>
        <option value="text">text</option>
        <option value="single_choice">single_choice</option>
        <option value="multi_choice">multi_choice</option>
      </select>

      <label>Question Text (EN)</label>
      <input id="text_en" placeholder="English text">

      <label>Question Text (EL)</label>
      <input id="text_el" placeholder="Greek text">

      <label>Question Text (TR)</label>
      <input id="text_tr" placeholder="Turkish text">

      <div id="options_area" style="display:none;">
        <label>Options (EN, one per line)</label>
        <textarea id="opts_en"></textarea>

        <label>Options (EL, one per line)</label>
        <textarea id="opts_el"></textarea>

        <label>Options (TR, one per line)</label>
        <textarea id="opts_tr"></textarea>
      </div>

      <label>Required</label>
      <select id="question_required">
        <option value="false" selected>false</option>
        <option value="true">true</option>
      </select>

      <button onclick="addQuestion()">Add Question</button>
      <button class="secondary" onclick="resetQuestionForm()">Clear Question Form</button>

      <div id="questions_preview"></div>

      <button onclick="createQuestionnaire()">Create Questionnaire</button>
      <div id="create_result" class="muted"></div>
    </div>
    </div>

    <div id="kiosks" class="tab-content" style="display:none;">	
	<div class="card">

    <h2>Create Kiosk</h2>

    <label>Kiosk Code</label>
    <input id="kiosk_code"
         placeholder="e.g. NICOSIA-01">

    <label>Kiosk Name</label>
    <input id="kiosk_name"
         placeholder="e.g. Nicosia District Court Kiosk 1">

    <label>Location</label>
    <input id="kiosk_location"
         placeholder="e.g. Nicosia District Court">

    <label>Active</label>
    <select id="kiosk_active">
      <option value="true" selected>true</option>
      <option value="false">false</option>
    </select>

    <button onclick="createKiosk()">
       Create Kiosk
    </button>

  <div id="kiosk_create_result"
       class="muted"></div>

</div>

<div class="card" id="edit_kiosk_card" style="display:none;">

  <h2>Edit Kiosk</h2>

  <input type="hidden" id="edit_kiosk_id">

  <label>Kiosk Code</label>
  <input id="edit_kiosk_code">

  <label>Kiosk Name</label>
  <input id="edit_kiosk_name">

  <label>Location</label>
  <input id="edit_kiosk_location">

  <label>Active</label>
  <select id="edit_kiosk_active">
    <option value="true">true</option>
    <option value="false">false</option>
  </select>

  <button onclick="saveKioskEdit()">
    Save Changes
  </button>

  <button class="secondary"
          onclick="cancelKioskEdit()">
    Cancel
  </button>

  <div id="edit_kiosk_result"
       class="muted"></div>

</div>
	
    <div class="row">
      <div class="card">
        <h2>Kiosks</h2>
        <button onclick="loadKiosks()">Refresh Kiosks</button>
        <div id="kiosks_list" class="muted"></div>
      </div>

      <div class="card">
        <h2>Questionnaires</h2>
        <button onclick="loadQuestionnaires()">Refresh Questionnaires</button>
        <div id="questionnaires_list" class="muted"></div>
      </div>
    </div>

    <div class="card">
      <h2>Assign Questionnaire to Kiosk</h2>

      <label>Select Kiosk</label>
      <select id="assign_kiosk"></select>

      <label>Select Questionnaire</label>
      <select id="assign_questionnaire"></select>

      <button onclick="assignQuestionnaire()">Assign</button>
      <div id="assign_result" class="muted"></div>
    </div>
    </div>
	
    <div id="responses" class="tab-content" style="display:none;">	
    <div class="card">
      <h2>Responses</h2>
      <button onclick="loadResponses()">Refresh Responses</button>
      <div id="responses_list" class="muted"></div>
	  
	  <button onclick="downloadCsv()">Export CSV</button>
	  
    </div>
	</div>
	
  </div>
</div>
<script>
    const API = "/kiosk";
</script>
<script src="admin.js"></script>
  
</body>
</html>
