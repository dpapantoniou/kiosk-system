<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fbf8f0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <title>CX-FP Kiosk</title>

    <link rel="preload" href="fonts/SourceSerif4-Variable.woff2"        as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/SourceSerif4-Italic-Variable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/JetBrainsMono-Variable.woff2"   as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="kiosk.css">
</head>

<body class="kiosk-shell">

<header class="kiosk-header">
    <div id="logo-area" class="kiosk-header__logo">
        <img id="kiosk-logo" src="" alt="" style="display:none;"
             onload="this.style.display='block'">
    </div>
    <div id="status-bar">
        <span id="offline-badge" class="offline-badge" data-visible="false">
            <span class="pulse-dot"></span>
            <span id="offline-text">Offline — stored locally</span>
        </span>
    </div>
</header>

<main class="kiosk-main">
    <div id="app"></div>
</main>

<footer id="ticker" class="kiosk-ticker" style="display:none;">
    <span><span class="kiosk-ticker__dot">●</span><span id="ticker-id">Kiosk —</span></span>
    <span id="ticker-time">—</span>
    <span id="ticker-status">Online</span>
</footer>

<!-- Idle warning — top-center hairline + footnote -->
<div id="idle-warning" class="idle-warning" data-visible="false" aria-live="polite">
    <span class="idle-warning__text" id="idle-warning-text">Still here? Tap to continue.</span>
    <div class="idle-warning__rule" aria-hidden="true"></div>
</div>

<!-- 429 cooldown overlay — full-screen, brief -->
<div id="cooldown" class="cooldown" data-visible="false" aria-live="polite">
    <p class="cooldown__phrase" id="cooldown-text">Please wait a moment.</p>
</div>

<script>
const API = "/kiosk";
const params = new URLSearchParams(window.location.search);

let state = {
    screen: "attract",
    questionnaire: null,
    answers: {},
    kioskCode: params.get("kiosk") || "01",
    lang: "el",
    currentQuestionIndex: 0,
};

function saveOffline(payload) {
    try {
        let queue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
        queue.push(payload);
        localStorage.setItem("offlineQueue", JSON.stringify(queue));
        console.log("Saved offline response. Queue size:", queue.length);
    } catch (e) {
        console.error("Failed to save offline response", e);
    }
}

async function syncOffline() {
    const queue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
    if (!queue.length) return;
    console.log("Attempting sync of", queue.length, "offline responses");

    const remaining = [];
    let dropped = 0;
    for (const item of queue) {
        try {
            const res = await fetch(API + "/responses", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(item),
            });
            // 4xx: backend rejects this entry — drop it (retrying will
            // fail again). 5xx + network: keep for retry.
            if (res.status >= 400 && res.status < 500) {
                console.warn("Dropping queued response (status " + res.status + ")");
                dropped++;
                continue;
            }
            if (!res.ok) throw new Error("Sync failed " + res.status);
        } catch {
            remaining.push(item);
        }
    }
    localStorage.setItem("offlineQueue", JSON.stringify(remaining));
    console.log("Sync complete. Remaining:", remaining.length, "dropped:", dropped);
}

// View Transitions API where supported, instant swap otherwise.
function startTransition(fn) {
    if (document.startViewTransition) {
        document.startViewTransition(fn);
    } else {
        fn();
    }
}

function render() {
    startTransition(() => {
        if (state.screen === "attract")  return renderAttract();
        if (state.screen === "language") return renderLanguage();
        if (state.screen === "survey")   return renderSurvey();
        if (state.screen === "thankyou") return renderThankYou();
    });
}

const ATTRACT_PHRASES = [
    { lang: "en", text: "How was your visit?" },
    { lang: "el", text: "Πώς ήταν η επίσκεψή σας;" },
    { lang: "tr", text: "Ziyaretiniz nasıldı?" },
];
const ATTRACT_DWELL_MS = 6000;
let attractTimer = null;

function renderAttract() {
    document.documentElement.lang = "en";
    document.getElementById("logo-area").style.visibility = "visible";
    document.getElementById("ticker").style.display = "flex";
    document.getElementById("ticker-id").textContent = "Kiosk " + state.kioskCode;
    startTicker();

    document.getElementById("app").innerHTML = `
        <div class="attract" role="button" tabindex="0" aria-label="Touch anywhere to begin"
             onclick="showLanguageSelection()"
             onkeydown="if(event.key==='Enter'||event.key===' ') showLanguageSelection();">
            <div class="attract__hero">
                ${ATTRACT_PHRASES.map((p, i) => `
                    <p class="attract__phrase" lang="${p.lang}"
                       data-idx="${i}" data-active="${i === 0 ? "true" : "false"}">${p.text}</p>
                `).join("")}
            </div>
            <div class="attract__cta">
                <span class="pulse-dot"></span>
                <span>Touch anywhere to begin</span>
            </div>
        </div>
    `;

    // Crossfade rotator
    const phrases = document.querySelectorAll(".attract__phrase");
    let active = 0;
    clearInterval(attractTimer);
    attractTimer = setInterval(() => {
        phrases[active].dataset.active = "false";
        active = (active + 1) % phrases.length;
        phrases[active].dataset.active = "true";
        document.documentElement.lang = ATTRACT_PHRASES[active].lang;
    }, ATTRACT_DWELL_MS);
}

let tickerTimer = null;
function startTicker() {
    const tEl = document.getElementById("ticker-time");
    const sEl = document.getElementById("ticker-status");
    const tick = () => {
        const d = new Date();
        const pad = n => String(n).padStart(2, "0");
        tEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        sEl.textContent = navigator.onLine ? "Online" : "Offline";
    };
    tick();
    clearInterval(tickerTimer);
    tickerTimer = setInterval(tick, 1000);
}
function stopAttractMotion() {
    clearInterval(attractTimer); attractTimer = null;
    clearInterval(tickerTimer);  tickerTimer = null;
    const t = document.getElementById("ticker");
    if (t) t.style.display = "none";
}

function showLanguageSelection() {
    stopAttractMotion();
    state.screen = "language";
    render();
}

const LANG_CARDS = [
    { code: "el", native: "Ελληνικά", letter: "Ε" },
    { code: "en", native: "English",  letter: "E" },
    { code: "tr", native: "Türkçe",   letter: "T" },
];

function renderLanguage() {
    document.documentElement.lang = "en";
    document.getElementById("logo-area").style.visibility = "visible";
    document.getElementById("ticker").style.display = "none";

    document.getElementById("app").innerHTML = `
        <div class="langpick">
            <div class="langpick__row">
                ${LANG_CARDS.map(c => `
                    <div class="langpick__card" lang="${c.code}"
                         role="button" tabindex="0"
                         aria-label="${c.native}"
                         data-code="${c.code}"
                         onclick="pickLang('${c.code}', this)"
                         onkeydown="if(event.key==='Enter'||event.key===' ') pickLang('${c.code}', this);">
                        <span class="langpick__bar"  aria-hidden="true"></span>
                        <span class="langpick__watermark" aria-hidden="true">${c.letter}</span>
                        <span class="langpick__native">${c.native}</span>
                        <span class="langpick__locale">${c.code.toUpperCase()}</span>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
}

function pickLang(lang, el) {
    el.dataset.pressed = "true";
    setTimeout(() => setLang(lang), 320);
}

function setLang(lang) {
    state.lang = lang;
    if (state.screen === "survey") {
        renderSurvey();
    } else {
        start();
    }
}

// ?demo=1 short-circuits start() and finalize() so the UI runs
// without the backend. Q3 only shows when the rating is 1–3,
// to exercise the branching/chapter-marks logic.
const DEMO_QUESTIONNAIRE = {
    id: 0, code: "demo", name: "Demo Survey", is_active: true,
    questions: [
        { id: 1, code: "rating", order_no: 1, question_type: "rating", is_required: true,
          text_i18n: {
              el: "Πώς θα αξιολογούσατε την επίσκεψή σας;",
              en: "How would you rate your visit?",
              tr: "Ziyaretinizi nasıl değerlendirirsiniz?",
          },
          options_i18n: null, branching_rule: null },

        { id: 2, code: "best", order_no: 2, question_type: "single_choice", is_required: true,
          text_i18n: {
              el: "Τι σας άρεσε περισσότερο;",
              en: "What did you enjoy most?",
              tr: "En çok ne hoşunuza gitti?",
          },
          options_i18n: {
              el: ["Η εξυπηρέτηση", "Η ατμόσφαιρα", "Η ποιότητα", "Η τιμή"],
              en: ["The service",   "The atmosphere", "The quality", "The price"],
              tr: ["Hizmet",        "Atmosfer",       "Kalite",      "Fiyat"],
          },
          branching_rule: null },

        // Conditional: only when the rating was low (1-3)
        { id: 3, code: "improve", order_no: 3, question_type: "multi_choice", is_required: false,
          text_i18n: {
              el: "Τι θα μπορούσε να βελτιωθεί;",
              en: "What could be improved?",
              tr: "Neler iyileştirilebilir?",
          },
          options_i18n: {
              el: ["Ταχύτητα", "Καθαριότητα", "Ευγένεια",       "Επιλογές μενού",   "Τίποτα"],
              en: ["Speed",    "Cleanliness", "Friendliness",   "Menu options",     "Nothing"],
              tr: ["Hız",      "Temizlik",    "Güleryüzlülük",  "Menü seçenekleri", "Hiçbir şey"],
          },
          branching_rule: { depends_on: "rating", equals_any: ["1", "2", "3"] } },

        { id: 4, code: "comments", order_no: 4, question_type: "text", is_required: false,
          text_i18n: {
              el: "Επιπλέον σχόλια;",
              en: "Any additional comments?",
              tr: "Eklemek istedikleriniz?",
          },
          options_i18n: null, branching_rule: null },
    ],
};

const isDemo = params.get("demo") === "1";

async function start() {

    // Demo mode — skip the network entirely
    if (isDemo) {
        state.questionnaire = DEMO_QUESTIONNAIRE;
        state.answers = {};
        state.currentQuestionIndex = 0;
        document.getElementById("logo-area").style.visibility = "visible";
        state.screen = "survey";
        render();
        resetIdleTimer();
        return;
    }

    try {
        const res = await fetch(API + "/by-code/" + state.kioskCode);
        if (!res.ok) throw new Error("Network error");
        const data = await res.json();
        state.questionnaire = data.questionnaire;

        if (data.logo_data) {
            document.getElementById("kiosk-logo").src = data.logo_data;
        }

        localStorage.setItem("cachedQuestionnaire", JSON.stringify(state.questionnaire));

        state.answers = {};
        state.currentQuestionIndex = 0;
        document.getElementById("logo-area").style.visibility = "visible";
        state.screen = "survey";
        render();
        resetIdleTimer();

    } catch (e) {
        console.log("Offline — trying cached questionnaire");
        try {
            const cached = localStorage.getItem("cachedQuestionnaire");
            if (!cached) throw new Error("No cache");
            state.questionnaire = JSON.parse(cached);
            state.answers = {};
            state.screen = "survey";
            render();
            resetIdleTimer();
        } catch (err) {
            document.getElementById("app").innerHTML = `
                <div class="thanks"><div class="thanks__inner">
                    <div class="thanks__phrase">Service unavailable</div>
                    <div class="thanks__sub">No cached questionnaire</div>
                </div></div>`;
        }
    }
}

let idleTimer;
let warningTimer;

function resetIdleTimer() {
    clearTimeout(idleTimer);
    clearTimeout(warningTimer);
    hideIdleWarning();

    let timeoutMs = 60000;
    if (state.screen === "survey" && state.questionnaire) {
        const currentQuestion = getSortedQuestions()[state.currentQuestionIndex];
        if (currentQuestion?.question_type === "text") {
            timeoutMs = 180000;
        }
    }

    // Idle warning fires at 75% of the timeout. Skip on attract —
    // it's already the idle screen and warning would be nonsense.
    if (state.screen !== "attract") {
        warningTimer = setTimeout(showIdleWarning, timeoutMs * 0.75);
    }

    idleTimer = setTimeout(() => {
        hideIdleWarning();
        state.screen = "attract";
        render();
    }, timeoutMs);
}

document.addEventListener("click",      resetIdleTimer);
document.addEventListener("touchstart", resetIdleTimer);

const IDLE_WARNING_TEXT = {
    el: "Είστε εκεί; Πατήστε για συνέχεια.",
    en: "Still here? Tap to continue.",
    tr: "Hâlâ orada mısınız? Devam etmek için dokunun.",
};
function showIdleWarning() {
    const el  = document.getElementById("idle-warning");
    const txt = document.getElementById("idle-warning-text");
    if (!el || !txt) return;
    txt.textContent = tr(IDLE_WARNING_TEXT);
    el.dataset.visible = "true";
}
function hideIdleWarning() {
    const el = document.getElementById("idle-warning");
    if (el) el.dataset.visible = "false";
}

const VALIDATION_MSG = {
    el: "Παρακαλώ απαντήστε",
    en: "Please answer",
    tr: "Lütfen yanıtlayın",
};
function showValidation() {
    const m = document.getElementById("vmark");
    const t = document.getElementById("vmsg");
    if (!m || !t) return;
    t.textContent = tr(VALIDATION_MSG);
    m.dataset.visible = "true";
    t.dataset.visible = "true";
}
function hideValidation() {
    const m = document.getElementById("vmark");
    const t = document.getElementById("vmsg");
    if (m) m.dataset.visible = "false";
    if (t) t.dataset.visible = "false";
}

// Surfaced on HTTP 429 from the backend's rapid-repeat throttle.
const COOLDOWN_TEXT = {
    el: "Παρακαλώ περιμένετε λίγο.",
    en: "Please wait a moment.",
    tr: "Lütfen bir dakika bekleyin.",
};
function showCooldownOverlay() {
    const el  = document.getElementById("cooldown");
    const txt = document.getElementById("cooldown-text");
    if (!el || !txt) return;
    txt.textContent = tr(COOLDOWN_TEXT);
    el.dataset.visible = "true";
}
function hideCooldownOverlay() {
    const el = document.getElementById("cooldown");
    if (el) el.dataset.visible = "false";
}

const OFFLINE_TEXT = {
    el: "Εκτός σύνδεσης — αποθηκεύεται τοπικά",
    en: "Offline — stored locally",
    tr: "Çevrimdışı — yerel olarak saklanıyor",
};
function setOfflineBadge() {
    const el  = document.getElementById("offline-badge");
    const txt = document.getElementById("offline-text");
    if (!el || !txt) return;
    txt.textContent = tr(OFFLINE_TEXT);
    el.dataset.visible = navigator.onLine ? "false" : "true";
}
window.addEventListener("offline", setOfflineBadge);
window.addEventListener("online",  setOfflineBadge);

// Onscreen keyboard handling — Linux OS keyboards typically overlay
// the bottom portion of the screen rather than resizing the viewport.
// Toggling .kbd-open on <body> reserves space below the survey so the
// text input + Continue button stay above the keyboard.
document.addEventListener("focusin", (e) => {
    if (e.target.tagName === "TEXTAREA") document.body.classList.add("kbd-open");
});
document.addEventListener("focusout", (e) => {
    if (e.target.tagName === "TEXTAREA") document.body.classList.remove("kbd-open");
});

function shouldShowQuestion(question) {
    if (!question.branching_rule) return true;

    const rule = question.branching_rule;
    const priorAnswer = state.answers[rule.depends_on];
    if (priorAnswer === undefined || priorAnswer === null) return false;

    const allowed = rule.equals_any || [];
    if (Array.isArray(priorAnswer)) {
        return priorAnswer.some(v => allowed.includes(String(v)));
    }
    return allowed.includes(String(priorAnswer));
}

const SUBMIT_LABEL = { el: "Συνέχεια", en: "Continue", tr: "Devam" };
const TEXT_INPUT_LABEL = {
    el: "Το σχόλιό σας",
    en: "Your comments",
    tr: "Yorumlarınız",
};
const TEXT_INPUT_PLACEHOLDER = {
    el: "Γράψτε εδώ…",
    en: "Type here…",
    tr: "Buraya yazın…",
};

function getSortedQuestions() {
    if (!state.questionnaire?.questions) return [];
    return [...state.questionnaire.questions].sort(
        (a, b) => a.order_no - b.order_no
    );
}
function getVisibleQuestions() {
    return getSortedQuestions().filter(shouldShowQuestion);
}

function tr(dict) {
    return dict ? (dict[state.lang] ?? dict.en) : undefined;
}

function escapeHTML(s) {
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

// Delegated to keep option strings out of inline onclick — embedding
// JSON-stringified Greek option text in attributes broke HTML parsing.
document.addEventListener("click", (e) => {
    const btn = e.target.closest(".choice-btn");
    if (!btn) return;
    const code = btn.dataset.code;
    const idx  = parseInt(btn.dataset.idx, 10);
    const multi = btn.dataset.multi === "true";
    const q = getSortedQuestions().find(q => q.code === code);
    if (!q) return;
    const opts = tr(q.options_i18n) || [];
    const opt = opts[idx];
    if (opt === undefined) return;
    if (multi) {
        toggleAnswer(code, opt, btn.dataset.selected !== "true");
    } else {
        answer(code, opt);
    }
    renderSurvey();
});

function renderChoices(q, isMulti) {
    const opts = tr(q.options_i18n) || [];
    const selected = state.answers[q.code];
    const checkmark = isMulti
        ? `<svg class="choice-indicator__check" viewBox="0 0 26 26"><polyline points="6,13 11,18 20,8"/></svg>`
        : "";
    return `<div class="choice-list">
        ${opts.map((opt, i) => {
            const isSelected = isMulti
                ? Array.isArray(selected) && selected.includes(opt)
                : selected === opt;
            return `
                <button class="choice-btn"
                        data-code="${q.code}"
                        data-multi="${isMulti}"
                        data-idx="${i}"
                        data-selected="${isSelected}">
                    <span class="choice-indicator" aria-hidden="true">${checkmark}</span>
                    <span class="choice-text">${escapeHTML(opt)}</span>
                </button>`;
        }).join("")}
    </div>`;
}

const ANSWER_RENDERERS = {
    rating: (q) => `<div class="rating-row">
        ${[1,2,3,4,5].map(i => `
            <button class="rating-btn"
                    data-selected="${state.answers[q.code] === i}"
                    onclick="answer('${q.code}', ${i}); renderSurvey();">${i}</button>
        `).join("")}
    </div>`,
    text: (q) => `<label class="text-input">
        <span class="text-input__label">${tr(TEXT_INPUT_LABEL)}</span>
        <textarea class="text-input__field" lang="${state.lang}"
            placeholder="${tr(TEXT_INPUT_PLACEHOLDER)}"
            oninput="answer('${q.code}', this.value)">${escapeHTML(state.answers[q.code] || "")}</textarea>
    </label>`,
    single_choice: (q) => renderChoices(q, false),
    multi_choice:  (q) => renderChoices(q, true),
};

function renderSurvey() {
    const q = state.questionnaire;
    if (!q || !q.questions) {
        document.getElementById("app").innerHTML = `
            <div class="thanks"><div class="thanks__inner">
                <div class="thanks__phrase">No questionnaire</div>
                <div class="thanks__sub">Please contact staff</div>
            </div></div>`;
        return;
    }

    document.documentElement.lang = state.lang;
    document.getElementById("ticker").style.display = "none";
    document.getElementById("logo-area").style.visibility = "visible";

    const sorted  = getSortedQuestions();
    const visible = getVisibleQuestions();
    const question = sorted[state.currentQuestionIndex];
    if (!question) { state.currentQuestionIndex = 0; return renderSurvey(); }

    const visibleIdx = Math.max(0, visible.indexOf(question));
    const total = visible.length;

    const text = escapeHTML(tr(question.text_i18n));
    const answerHTML = (ANSWER_RENDERERS[question.question_type] || (() => ""))(question);

    // Chapter-marks markup
    const chapterMarks = visible.map((_, i) => {
        const s = i < visibleIdx ? "done" : i === visibleIdx ? "current" : "upcoming";
        return `<span class="chapter-mark" data-state="${s}" aria-hidden="true"></span>`;
    }).join("");

    const submitLabel = tr(SUBMIT_LABEL);

    document.getElementById("app").innerHTML = `
        <div class="survey">
            <div class="survey__main">
                <div class="survey__question" lang="${state.lang}">
                    <span class="validation-mark" id="vmark" data-visible="false">*</span>
                    <h2 class="survey__qtext">${text}</h2>
                    <div class="validation-message" id="vmsg" data-visible="false"></div>
                </div>
                <div class="survey__answer">${answerHTML}</div>
                <div class="survey__actions">
                    <button id="submitBtn" class="survey__submit" onclick="submitCurrentQuestion()">
                        <span>${submitLabel}</span>
                        <span class="survey__submit__arrow">→</span>
                    </button>
                </div>
            </div>
            <aside class="survey__meta">
                <div class="survey__progress">
                    <span class="survey__progress-label">
                        ${String(visibleIdx + 1).padStart(2, "0")} / ${String(total).padStart(2, "0")}
                    </span>
                    <div class="chapter-marks" role="presentation">${chapterMarks}</div>
                </div>
                <div class="survey__lang">
                    ${["el","en","tr"].map(l => `
                        <button class="lang-pill" data-active="${state.lang === l}"
                                onclick="setLang('${l}')">${l.toUpperCase()}</button>
                    `).join("")}
                </div>
            </aside>
        </div>
    `;
}

function answer(code, value) {
    state.answers[code] = value;
    hideValidation();
}

function toggleAnswer(code, value, checked) {
    hideValidation();
    if (!state.answers[code]) state.answers[code] = [];

    if (checked) {
        if (!state.answers[code].includes(value)) {
            state.answers[code].push(value);
        }
    } else {
        state.answers[code] = state.answers[code].filter(v => v !== value);
        if (state.answers[code].length === 0) delete state.answers[code];
    }
}
function findNextVisibleIndex(from) {
    const questions = getSortedQuestions();
    for (let i = from; i < questions.length; i++) {
        if (shouldShowQuestion(questions[i])) return i;
    }
    return -1;
}
function findPrevVisibleIndex(from) {
    const questions = getSortedQuestions();
    for (let i = from; i >= 0; i--) {
        if (shouldShowQuestion(questions[i])) return i;
    }
    return -1;
}

function nextQuestion() {
    const next = findNextVisibleIndex(state.currentQuestionIndex + 1);
    if (next === -1) return finalizeQuestionnaire();
    state.currentQuestionIndex = next;
    renderSurvey();
}

function prevQuestion() {
    const prev = findPrevVisibleIndex(state.currentQuestionIndex - 1);
    if (prev === -1) return;
    state.currentQuestionIndex = prev;
    renderSurvey();
}

function submitCurrentQuestion() {
    const questions = getSortedQuestions();
    const currentQuestion = questions[state.currentQuestionIndex];
    const ans = state.answers[currentQuestion.code];

    const isEmpty = ans === undefined || ans === null
        || (Array.isArray(ans) && ans.length === 0)
        || ans === "";
    if (currentQuestion.is_required && isEmpty) {
        showValidation();
        return;
    }
    hideValidation();

    const btn = document.getElementById("submitBtn");
    if (btn) {
        btn.disabled = true;
        btn.dataset.busy = "true";
    }

    const next = findNextVisibleIndex(state.currentQuestionIndex + 1);
    setTimeout(() => {
        if (next === -1) {
            finalizeQuestionnaire();
        } else {
            state.currentQuestionIndex = next;
            renderSurvey();
        }
    }, 600);
}

async function finalizeQuestionnaire() {

    const btn = document.getElementById("submitBtn");
    if (btn) {
        btn.disabled = true;
        btn.dataset.busy = "true";
    }

    const payload = {

        questionnaire_id:
            state.questionnaire.id,

        kiosk_code:
            state.kioskCode,

        answers:
            state.answers,

        lang:
            state.lang || "el"
    };

    if (isDemo) {
        // Demo mode — skip the POST, just show the thank-you flow.
        console.log("Demo submit (not sent):", payload);
        state.screen = "thankyou";
        render();
        setTimeout(() => { state.screen = "attract"; render(); }, 3000);
        return;
    }

    try {
        const res = await fetch(API + "/responses", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });

        if (res.status === 429) {
            // Anti-abuse cooldown — don't queue (retry would re-fail).
            showCooldownOverlay();
            setTimeout(() => {
                hideCooldownOverlay();
                state.screen = "attract";
                render();
            }, 4000);
            return;
        }

        if (res.status >= 500) {
            // Server hiccup — queue for retry via syncOffline.
            throw new Error("Server error " + res.status);
        }

        if (!res.ok) {
            // Other 4xx (400/401/403/404/422 etc.) — backend rejected
            // the response. Queueing would re-fail; log and continue
            // to the thank-you screen so the kiosk doesn't get stuck.
            console.error("Backend rejected response:", res.status);
        } else {
            console.log("Submitted successfully");
        }

    } catch (e) {
        // Network failure or 5xx — retryable.
        console.log("Network/server error — queueing response", e);
        saveOffline(payload);
    }

    state.screen = "thankyou";
    render();

    setTimeout(() => {
        state.screen = "attract";
        render();
    }, 3000);
}

const THANKS = {
    el: { phrase: "Ευχαριστούμε", sub: "Η γνώμη σας καταγράφηκε" },
    en: { phrase: "Thank you",   sub: "Your feedback was saved"  },
    tr: { phrase: "Teşekkürler", sub: "Geri bildiriminiz kaydedildi" },
};

function renderThankYou() {
    document.getElementById("ticker").style.display = "none";
    document.documentElement.lang = state.lang;
    const t = tr(THANKS);

    document.getElementById("app").innerHTML = `
        <div class="thanks" lang="${state.lang}">
            <div class="thanks__inner">
                <div class="thanks__phrase">${escapeHTML(t.phrase)}<span class="thanks__period">.</span></div>
                <div class="thanks__rule" aria-hidden="true"></div>
                <div class="thanks__sub">${escapeHTML(t.sub)}</div>
            </div>
        </div>
    `;
}

setOfflineBadge();
render();

window.addEventListener("online", () => {
    console.log("Back online — syncing...");
    syncOffline();
});
setInterval(syncOffline, 10000);

console.log("Offline queue:", JSON.parse(localStorage.getItem("offlineQueue") || "[]").length);
