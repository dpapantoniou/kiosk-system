<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CX-FP Kiosk</title>

    <link rel="stylesheet" href="kiosk.css">
</head>

<body>

<div class="wrap">
    <div id="app"></div>
</div>

<script>
const API = "/kiosk";
const params = new URLSearchParams(window.location.search);

let state = {
    screen: "attract",
    questionnaire: null,
    answers: {},
    kioskCode: params.get("kiosk") || "01",
    lang: "el",
    currentQuestionIndex: 0,
    cooldownRemaining: 0,
    heartbeatIntervalMinutes: 30,
};

// =====================================================
// OFFLINE SUPPORT — local queue storage
// =====================================================

function saveOffline(payload) {
    try {
        let queue = JSON.parse(localStorage.getItem("offlineQueue") || "[]");
        queue.push(payload);
        localStorage.setItem("offlineQueue", JSON.stringify(queue));
        console.log("Saved offline response. Queue size:", queue.length);
    } catch (e) {
        console.error("Failed to save offline response", e);
    }
}

async function syncOffline() {

    let queue = JSON.parse(
        localStorage.getItem("offlineQueue") || "[]"
    );

    if (!queue.length) return;

    console.log(
        "Attempting sync of",
        queue.length,
        "offline responses"
    );

    let remaining = [];

    for (const item of queue) {

        try {

            const res = await fetch(
                API + "/responses",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(item)
                }
            );

            if (!res.ok)
                throw new Error("Failed sync");

        } catch {
            remaining.push(item);
        }
    }

    localStorage.setItem(
        "offlineQueue",
        JSON.stringify(remaining)
    );

    console.log(
        "Sync complete. Remaining:",
        remaining.length
    );
}

// =====================================================
// SCREEN RENDERING
// =====================================================

function render() {

    if (state.screen === "attract")
        renderAttract();

    if (state.screen === "language")
        renderLanguage();

    if (state.screen === "survey")
        renderSurvey();

    if (state.screen === "thankyou")
        renderThankYou();

    if (state.screen === "cooldown")
        renderCooldown();
}

// =====================================================
// IDLE SCREEN
// =====================================================

function renderAttract() {

    document.getElementById("app").innerHTML = `
        <div class="card attract-screen"
             onclick="showLanguageSelection()">

            <div class="attract-marquee">

                <div class="attract-line">
                    Your Opinion Counts
                </div>

                <div class="attract-line">
                    Η Γνώμη σας Μετράει
                </div>

                <div class="attract-line">
                    Görüşünüz Önemlidir
                </div>

            </div>

            <p class="touch-prompt">
                Touch screen to begin
            </p>

        </div>
    `;
}

function showLanguageSelection() {

    state.screen = "language";
    render();
}

function renderLanguage() {

    document.getElementById("app").innerHTML = `
        <div class="card">

            <div class="thank-you">

                <h1>
                    Select Language
                </h1>

            </div>

            <div class="lang-grid">

                <button class="lang-button"
                        onclick="setLang('el')">
                    Ελληνικά
                </button>

                <button class="lang-button"
                        onclick="setLang('en')">
                    English
                </button>

                <button class="lang-button"
                        onclick="setLang('tr')">
                    Türkçe
                </button>

            </div>

        </div>
    `;
}



function setLang(lang) {
    state.lang = lang;
    start();
}

// =====================================================
// START QUESTIONNAIRE
// =====================================================

async function start() {

    try {

        const res = await fetch(
            API + "/by-code/" + state.kioskCode
        );

        if (!res.ok)
            throw new Error("Network error");

        const data = await res.json();

        state.questionnaire = data.questionnaire;

        // cache questionnaire
        localStorage.setItem(
            "cachedQuestionnaire",
            JSON.stringify(state.questionnaire)
        );

        state.answers = {};
        state.currentQuestionIndex = 0;
		state.screen = "survey";

        render();
        resetIdleTimer();

    } catch (e) {

        console.log(
            "Offline — trying cached questionnaire"
        );

        try {

            const cached = localStorage.getItem(
                "cachedQuestionnaire"
            );

            if (!cached)
                throw new Error("No cache");

            state.questionnaire = JSON.parse(cached);

            state.answers = {};
            state.screen = "survey";

            render();
            resetIdleTimer();

        } catch (err) {

            document.getElementById("app").innerHTML = `
                <div class="card">
                    <div class="thank-you">
                        <h1>Service unavailable</h1>
                        <p>No cached questionnaire available</p>
                    </div>
                </div>
            `;
        }
    }
}

// =====================================================
// IDLE TIMER
// =====================================================

let idleTimer;
let nextQuestionTimer = null;
function resetIdleTimer() {
    clearTimeout(idleTimer);
    let timeoutMs = 60000;
    if (
        state.screen === "survey" &&
        state.questionnaire
    ) {
        const questions =
            [...state.questionnaire.questions]
                .sort(
                    (a,b) =>
                        a.order_no - b.order_no
                );
        const currentQuestion =
            questions[
                state.currentQuestionIndex
            ];
        if (
            currentQuestion &&
            currentQuestion.question_type === "text"
        ) {
            timeoutMs = 180000;
        }
    }
    idleTimer = setTimeout(() => {
        state.screen = "attract";
        render();
    }, timeoutMs);
}

document.addEventListener(
    "click",
    resetIdleTimer
);

document.addEventListener(
    "touchstart",
    resetIdleTimer
);

// =====================================================
// BRANCHING
// =====================================================

function shouldShowQuestion(question) {

    if (!question.branching_rule)
        return true;

    const rule = question.branching_rule;

    const priorAnswer =
        state.answers[rule.depends_on];

    if (
        priorAnswer === undefined ||
        priorAnswer === null
    ) {
        return false;
    }

    const allowed =
        rule.equals_any || [];

    if (Array.isArray(priorAnswer)) {

        return priorAnswer.some(v =>
            allowed.includes(String(v))
        );
    }

    return allowed.includes(
        String(priorAnswer)
    );
}

// =====================================================
// SURVEY RENDERING
// =====================================================

function renderSurvey() {

    const q = state.questionnaire;

    if (!q || !q.questions) {

        document.getElementById("app").innerHTML = `
            <div class="card">
                <div class="thank-you">
                    <h1>No questionnaire available</h1>
                </div>
            </div>
        `;

        return;
    }

    let html = `

        <div class="language-bar">

			<button
				class="${
					state.lang === 'el'
					? 'selected-lang'
					: ''
					}"
				onclick="setLang('el')"
					>
                EL
            </button>

			<button
				class="${
					state.lang === 'en'
					? 'selected-lang'
					: ''
					}"
				onclick="setLang('en')"
					>			
                EN
            </button>

			<button
				class="${
					state.lang === 'tr'
					? 'selected-lang'
					: ''
					}"
				onclick="setLang('tr')"
					>						
                TR
            </button>

        </div>

        <div class="card">

    `;

  const questions =
    [...q.questions]
        .sort(
            (a,b) =>
                a.order_no - b.order_no
        );

const question =
    questions[
        state.currentQuestionIndex
    ];
	
	console.log(
    "Displaying:",
    question.code
   );
	
    if (!question) {

    state.currentQuestionIndex = 0;

    return renderSurvey();
}
  
        const text =
            question.text_i18n[state.lang] ||
            question.text_i18n['en'];
        html += `
            <div class="question-block">
                <div class="question-text">
                    ${text}
                </div>
        `;
        // =============================================
        // RATING
        // =============================================
        if (question.question_type === "rating") {
            html += `<div class="rating-grid">`;
            for (let i = 1; i <= 5; i++) {
                const selected =
                    state.answers[question.code] === i
                        ? "selected"
                        : "";
                html += `
                    <button
                        class="rating-button ${selected}"
                        onclick="
                            answer('${question.code}', ${i});
                            renderSurvey();
                        "
                    >
                        ${i}
                    </button>
                `;
            }
            html += `</div>`;
        }
        // =============================================
        // TEXT
        // =============================================
        if (question.question_type === "text") {
            html += `
                <textarea
				    lang="${state.lang}"
                    onchange="
                        answer(
                            '${question.code}',
                            this.value
                        )
                    "
                    placeholder="your comments"
                >${
                    state.answers[question.code] || ""
                }</textarea>
            `;
        }
        // =============================================
        // SINGLE CHOICE
        // =============================================
    if (question.question_type === "single_choice") {

    const opts = (
        question.options_i18n &&
        (
            question.options_i18n[state.lang] ||
            question.options_i18n['en']
        )
    ) || [];

    html += `<div class="choice-list">`;

    opts.forEach(opt => {

        const checked =
            state.answers[question.code] === opt
                ? "checked"
                : "";

        html += `

            <label class="choice-option">

                <input
                    type="radio"
                    name="${question.code}"
                    ${checked}
                    onchange="
                        answer(
                            '${question.code}',
                            '${opt}'
                        );
                        renderSurvey();
                    "
                >

                ${opt}

            </label>
        `;
    });

    html += `</div>`;
}
        // =============================================
        // MULTI CHOICE
        // =============================================
        if (question.question_type === "multi_choice") {
            const opts = (
                question.options_i18n &&
                (
                    question.options_i18n[state.lang] ||
                    question.options_i18n['en']
                )
            ) || [];
            html += `<div class="choice-list">`;
            opts.forEach(opt => {
                const checked =
                    (
                        state.answers[question.code] || []
                    ).includes(opt)
                        ? "checked"
                        : "";
                html += `
                    <label class="choice-option">
                        <input
                            type="checkbox"
                            ${checked}
                            onchange="
                                toggleAnswer(
                                    '${question.code}',
                                    '${opt}',
                                    this.checked
                                );
                                renderSurvey();
                            "
                        >
                        ${opt}
                    </label>
                `;
            });
            html += `</div>`;
        }
        html += `</div>`;

    html += `

        <div class="navigation">

            <button
                id="submitBtn"
                onclick="submitCurrentQuestion()"
            >
                Submit
            </button>

        </div>

        </div>
    `;

    document.getElementById("app").innerHTML = html;
}

// =====================================================
// ANSWER STORAGE
// =====================================================

function answer(code, value) {
    state.answers[code] = value;
}

function toggleAnswer(code, value, checked) {

    if (!state.answers[code]) {
        state.answers[code] = [];
    }

    if (checked) {

        if (!state.answers[code].includes(value)) {
            state.answers[code].push(value);
        }

    } else {

        state.answers[code] =
            state.answers[code].filter(
                v => v !== value
            );

        if (state.answers[code].length === 0) {
            delete state.answers[code];
        }
    }
}
function nextQuestion() {
  const questions =
    [...state.questionnaire.questions]
        .sort(
            (a,b) =>
                a.order_no - b.order_no
        );
    let nextIndex =
        state.currentQuestionIndex + 1;
    while (nextIndex < questions.length) {
        const candidate =
            questions[nextIndex];
        if (
            shouldShowQuestion(candidate)
        ) {
            state.currentQuestionIndex =
                nextIndex;
            renderSurvey();
           return;
        }
        nextIndex++;
    }
  finalizeQuestionnaire();
}


function prevQuestion() {
   const questions =
    [...state.questionnaire.questions]
        .sort(
            (a,b) =>
                a.order_no - b.order_no
        );
    let prevIndex =
        state.currentQuestionIndex - 1;
    while (prevIndex >= 0) {
        const candidate =
            questions[prevIndex];
        if (
            shouldShowQuestion(candidate)
        ) {
            state.currentQuestionIndex =
                prevIndex;
            renderSurvey();
            return;
        }

        prevIndex--;
    }
}
// =====================================================
// SUBMIT
// =====================================================
function submitCurrentQuestion() {

    const questions =
        [...state.questionnaire.questions]
            .sort(
                (a,b) =>
                    a.order_no - b.order_no
            );

    const currentQuestion =
        questions[
            state.currentQuestionIndex
        ];

    const ans =
        state.answers[currentQuestion.code];

    if (
        currentQuestion.is_required &&
        (
            ans === undefined ||
            ans === null ||
            ans.length === 0
        )
    ) {

        alert(
            "Please answer the question"
        );

        return;
    }

    const btn =
        document.getElementById("submitBtn");

    if (btn) {

        btn.disabled = true;

        btn.innerText = "Saving...";
    }

    let nextIndex =
        state.currentQuestionIndex + 1;

    while (nextIndex < questions.length) {

        const candidate =
            questions[nextIndex];

        if (
            shouldShowQuestion(candidate)
        ) {

            setTimeout(() => {

                state.currentQuestionIndex =
                    nextIndex;

                renderSurvey();

            }, 1000);

            return;
        }

        nextIndex++;
    }

    setTimeout(() => {

        finalizeQuestionnaire();

    }, 1000);
}

async function finalizeQuestionnaire() {

    const btn =
        document.getElementById("submitBtn");

    if (btn) {

        btn.disabled = true;

        btn.innerText = "Submitting...";
    }

    const payload = {

        questionnaire_id:
            state.questionnaire.id,

        kiosk_code:
            state.kioskCode,

        answers:
            state.answers,

        lang:
            state.lang || "el"
    };

    try {

        const res = await fetch(
            API + "/responses",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body:
                    JSON.stringify(payload)
            }
        );

        const data = await res.json();

        if (res.status === 429) {
            const detail = data.detail || data;
            showCooldown(
                detail.remaining_seconds || 30
            );
            return;
        }

        if (!res.ok)
            throw new Error("Network error");

        console.log(
            "Submitted successfully"
        );

        showCooldown(
            data.cooldown_seconds || 3
        );

        return;

    } catch (e) {

        console.log(
            "Offline — storing response"
        );

        saveOffline(payload);
    }

    state.screen = "thankyou";

    render();

    setTimeout(() => {

        state.screen = "attract";

        render();

    }, 3000);
}


// =====================================================
// COOLDOWN SCREEN
// =====================================================

let cooldownTimer = null;

function showCooldown(seconds) {

    state.cooldownRemaining = Math.max(
        0,
        parseInt(seconds || 0)
    );

    state.screen = "cooldown";
    render();

    clearInterval(cooldownTimer);

    cooldownTimer = setInterval(() => {

        state.cooldownRemaining -= 1;

        if (state.cooldownRemaining <= 0) {
            clearInterval(cooldownTimer);
            state.screen = "attract";
            state.answers = {};
            state.currentQuestionIndex = 0;
            render();
            return;
        }

        render();

    }, 1000);
}

function renderCooldown() {

    const messages = {
        el: {
            title: "Ευχαριστούμε!",
            body: "Η γνώμη σας έχει καταγραφεί.",
            wait: "Το kiosk θα είναι ξανά διαθέσιμο σε"
        },
        en: {
            title: "Thank you!",
            body: "Your feedback has been recorded.",
            wait: "The kiosk will become available again in"
        },
        tr: {
            title: "Teşekkür ederiz!",
            body: "Geri bildiriminiz kaydedildi.",
            wait: "Kiosk tekrar kullanılabilir olacak"
        }
    };

    const msg = messages[state.lang] || messages.en;

    document.getElementById("app").innerHTML = `

        <div class="card">

            <div class="thank-you">

                <h1>${msg.title}</h1>

                <p>${msg.body}</p>

                <p>
                    ${msg.wait}
                    <strong>${state.cooldownRemaining}</strong>
                    sec.
                </p>

            </div>

        </div>
    `;
}

// =====================================================
// THANK YOU SCREEN
// =====================================================

function renderThankYou() {

    document.getElementById("app").innerHTML = `

        <div class="card">

            <div class="thank-you">

                <h1>Thank you!</h1>

                <p>
                    Your feedback has been recorded.
                </p>

            </div>

        </div>
    `;
}


// =====================================================
// HEARTBEAT / MONITORING
// =====================================================

let heartbeatTimer = null;

async function loadMonitoringConfig() {
    try {
        const res = await fetch(API + "/monitoring/config");
        if (!res.ok) return;

        const data = await res.json();
        const minutes = parseInt(
            data.heartbeat_interval_minutes || 30
        );

        if (minutes > 0) {
            state.heartbeatIntervalMinutes = minutes;
        }
    } catch (e) {
        console.log("Monitoring config unavailable; using default.");
    }
}

async function sendHeartbeat() {
    try {
        await fetch(API + "/kiosks/heartbeat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                kiosk_code: state.kioskCode,
                app_version: "1.3",
                device_name: navigator.platform || "browser",
                device_info: {
                    user_agent: navigator.userAgent,
                    language: navigator.language,
                    screen_width: window.screen ? window.screen.width : null,
                    screen_height: window.screen ? window.screen.height : null
                }
            })
        });
    } catch (e) {
        // Silent by design: heartbeat failures must not interrupt citizens.
        console.log("Heartbeat failed; will retry later.");
    }
}

async function startHeartbeat() {
    await loadMonitoringConfig();
    await sendHeartbeat();

    const intervalMs =
        state.heartbeatIntervalMinutes * 60 * 1000;

    clearInterval(heartbeatTimer);
    heartbeatTimer = setInterval(
        sendHeartbeat,
        intervalMs
    );
}

// =====================================================
// INIT
// =====================================================

render();
startHeartbeat();

// =====================================================
// AUTO SYNC
// =====================================================

window.addEventListener("online", () => {

    console.log(
        "Back online — syncing..."
    );

    syncOffline();
});

setInterval(syncOffline, 10000);

console.log(
    "Offline queue:",
    JSON.parse(
        localStorage.getItem("offlineQueue") || "[]"
    ).length
);

</script>

</body>
</html>
